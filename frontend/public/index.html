        <!-- Remove Emergent badge after DOM ready -->
        <script>
            (function() {
                function removeEmergentBadge() {
                    var selectors = ['#emergent-badge', '[id*="emergent"]', 'a[href*="emergent.sh"]', 'a[href*="emergentagent"]'];
                    selectors.forEach(function(selector) {
                        document.querySelectorAll(selector).forEach(function(el) {
                            if (el && el.parentNode) el.parentNode.removeChild(el);
                        });
                    });
                }
                
                document.addEventListener('DOMContentLoaded', removeEmergentBadge);
                window.addEventListener('load', removeEmergentBadge);
                
                var count = 0;
                var interval = setInterval(function() {
                    removeEmergentBadge();
                    if (++count >= 10) clearInterval(interval);
                }, 1000);
                
                if (typeof MutationObserver !== 'undefined') {
                    var observer = new MutationObserver(removeEmergentBadge);
                    document.addEventListener('DOMContentLoaded', function() {
                        observer.observe(document.body, { childList: true, subtree: true });
                    });
                }
            })();
